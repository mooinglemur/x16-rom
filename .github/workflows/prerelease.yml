name: ROM Prerelease

on:
  push:
    tags:
      - 'pr*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: |
          sudo apt-get install -y make build-essential perl
          git clone https://github.com/cc65/cc65.git
          cd cc65
          make -j4
          sudo make install
      - name: Build ROM
        run: |
          export PRERELEASE_VERSION=$(echo "$GITHUB_REF" | perl -pe 's/^.*r([0-9]+)$/$1/')
          make
          mkdir artifact
          cp build/x16/*.h artifact/.
          cp build/x16/*.sym artifact/.
          cp build/x16/rom.bin artifact/.
      - name: Create Release Archive
        run: |
          zip --junk-paths artifact.zip artifact/*
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: true
      - name: Upload Release Asset
        id: upload-release-asset 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps 
          asset_path: ./artifact.zip
          asset_name: ROM Prerelease.zip
          asset_content_type: application/zip
